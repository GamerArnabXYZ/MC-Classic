<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>ClassiSphere</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container { text-align: center; padding: 24px; }
    .title {
      font-family: Georgia, serif;
      font-size: clamp(32px, 8vw, 64px);
      font-weight: bold;
      color: #c8a0e0;
      letter-spacing: 2px;
      text-shadow: 0 0 40px rgba(200,160,224,0.4);
      margin-bottom: 8px;
    }
    .sub {
      font-size: clamp(10px, 2.5vw, 13px);
      color: rgba(255,255,255,0.3);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .play-btn {
      display: inline-block;
      padding: 16px 48px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .play-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,58,237,0.6); }
    .play-btn:active { transform: translateY(0); box-shadow: 0 2px 12px rgba(124,58,237,0.4); }
    .note { margin-top: 24px; font-size: clamp(10px, 2.5vw, 12px); color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">ClassiSphere</div>
    <div class="sub">Minecraft Classic</div>
    <a href="play.html" class="play-btn">Play Now</a>
    <div class="note">Works on desktop &amp; mobile</div>
  </div>
  <script>
    setTimeout(function() { window.location.href = 'play.html'; }, 1500);
  </script>
</body>
</html>
