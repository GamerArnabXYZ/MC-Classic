<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>ClassiSphere</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    html {
      width: 100%; height: 100%;
      height: -webkit-fill-available;
      background: #0a0a0a;
    }
    body {
      width: 100%; height: 100%;
      height: -webkit-fill-available;
      min-height: -webkit-fill-available;
      background: #0a0a0a;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    #game-wrapper {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #canvas {
      display: block;
      border: 0 !important;
      padding: 0 !important;
      margin: 0;
      background-color: #715580;
      width: 100vw;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      image-rendering: auto;
      -ms-interpolation-mode: bicubic;
    }
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .logo-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: bold;
      color: #c8a0e0;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(200,160,224,0.5), 0 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 8px;
    }
    .logo-sub {
      font-family: Arial, sans-serif;
      font-size: clamp(11px, 2.5vw, 14px);
      color: rgba(255,255,255,0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .progress-wrap {
      width: clamp(180px, 50vw, 300px);
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8b5cf6, #c084fc);
      border-radius: 2px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(139,92,246,0.6);
    }
    #logmsg {
      font-family: Arial, sans-serif;
      font-size: clamp(12px, 3vw, 15px);
      color: rgba(255,255,255,0.5);
      text-align: center;
      white-space: pre-wrap;
      max-width: 80vw;
      line-height: 1.5;
    }
    #logmsg.error { color: #ff6b6b; }
    .dots {
      display: flex;
      gap: 8px;
      margin-top: 28px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(139,92,246,0.7);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%            { transform: scale(1);   opacity: 1;   }
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas class="emscripten" id="canvas"
            oncontextmenu="event.preventDefault()"
            tabindex="-1" width="1000" height="562">
    </canvas>
  </div>

  <div id="loading-overlay">
    <div class="logo-text">ClassiSphere</div>
    <div class="logo-sub">Minecraft Classic</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="logmsg">Initializing...</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script type="text/javascript">
    function setVh() {
      var vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    setVh();
    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', function() { setTimeout(setVh, 150); });

    function logText(text) {
      console.log(text);
      var el  = document.getElementById('logmsg');
      var bar = document.getElementById('progress-bar');
      var ov  = document.getElementById('loading-overlay');
      if (!el) return;
      if (!text || text === 'All downloads complete.') {
        if (bar) bar.style.width = '100%';
        setTimeout(function() { if (ov) ov.classList.add('hidden'); }, 700);
        return;
      }
      el.innerHTML = text;
      var m = text.match(/(\d+)\/(\d+)/);
      if (m && bar) {
        bar.style.width = Math.round((parseInt(m[1]) / parseInt(m[2])) * 90) + '%';
      } else if (text.indexOf('Downloading') !== -1 && bar) {
        bar.style.width = '10%';
      }
      if (text.indexOf('crashed') !== -1 || text.indexOf('Error') !== -1) {
        el.className = 'error';
        if (ov) { ov.style.opacity = '1'; ov.style.visibility = 'visible'; }
      }
    }

    var idb = window.indexedDB || window.mozIndexedDB || window.webkitIndexedDB || window.msIndexedDB;
    if (!idb) { alert('IndexedDB unsupported\nMaps and settings will not save'); window.mozIndexedDB = {}; }

    function preloadIndexedDB() { _interop_LoadIndexedDB(); }

    function getCssInt(s, p) { return parseInt(s.getPropertyValue(p), 10) || 0; }

    function resizeGameCanvas() {
      var c = document.getElementById('canvas');
      if (!c) return;
      var dpi = window.devicePixelRatio || 1;
      var par = c.parentNode;
      var st  = window.getComputedStyle(par, null);
      var w   = Math.round(par.offsetWidth - getCssInt(st,'padding-left') - getCssInt(st,'padding-right'));
      var h   = Math.round(window.innerHeight);
      if (h % 2) h -= 1;
      if (w % 2) w -= 1;
      c.width  = w * dpi;
      c.height = h * dpi;
    }
    window.addEventListener('resize', resizeGameCanvas);
    window.addEventListener('orientationchange', function() { setTimeout(resizeGameCanvas, 200); });

    function logFatal(event) {
      logText('ClassiSphere crashed:\n' + event + '\nOpen DevTools > Console for details');
      Module.setStatus = function(t) { if (event) Module.printErr('[post-exception] ' + event); };
    }

    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    var Module = {
      preRun:  [ preloadIndexedDB, resizeGameCanvas ],
      postRun: [],
      arguments: ['Singleplayer'],
      print: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
      canvas: (function() { return document.getElementById('canvas'); })(),
      setStatus: logText,
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      onAbort: function(why) { logFatal('abort: ' + why); }
    };

    Module.setStatus('Downloading...');

    window.onerror = function(msg, source, lineno, colno, error) {
      logFatal(msg + ' at ' + lineno + ',' + colno + ' in ' + (source+'').replace('classisphere.js','CC.js'));
    };
  </script>

  <script type="text/javascript" src="classisphere.js"></script>
</body>
</html>
