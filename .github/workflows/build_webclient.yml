name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: trzeci/emscripten-fastcomp:1.39.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          
      - name: Compile webclient
        run: |
          emcc src/*.c src/webclient/*.c -o ClassiCube.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=64MB \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=0 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g0 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration
          
          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' ClassiCube.js
          
      - name: Create HTML wrapper
        run: |
          echo '<!DOCTYPE html>' > index.html
          echo '<html lang="en">' >> index.html
          echo '<head>' >> index.html
          echo '    <meta charset="UTF-8">' >> index.html
          echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">' >> index.html
          echo '    <title>ClassiCube - Minecraft Classic</title>' >> index.html
          echo '    <style>' >> index.html
          echo '        * { margin: 0; padding: 0; box-sizing: border-box; }' >> index.html
          echo '        body { background: #000; overflow: hidden; touch-action: none; }' >> index.html
          echo '        canvas { display: block; width: 100%; height: 100%; cursor: grab; }' >> index.html
          echo '        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: monospace; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }' >> index.html
          echo '    </style>' >> index.html
          echo '</head>' >> index.html
          echo '<body>' >> index.html
          echo '    <div id="loading">Loading ClassiCube...<br>Please wait</div>' >> index.html
          echo '    <script>' >> index.html
          echo '        window.addEventListener("load", function() {' >> index.html
          echo '            setTimeout(function() {' >> index.html
          echo '                var loading = document.getElementById("loading");' >> index.html
          echo '                if (loading) loading.style.display = "none";' >> index.html
          echo '            }, 1000);' >> index.html
          echo '        });' >> index.html
          echo '    </script>' >> index.html
          echo '    <script src="ClassiCube.js"></script>' >> index.html
          echo '</body>' >> index.html
          echo '</html>' >> index.html
          
      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp ClassiCube.js deploy/
          cp index.html deploy/
          
          echo "# ClassiCube Web Client" > deploy/README.md
          echo "" >> deploy/README.md
          echo "Play Minecraft Classic directly in your browser!" >> deploy/README.md
          echo "" >> deploy/README.md
          echo "## How to Play" >> deploy/README.md
          echo "- Open \`index.html\` in any modern browser" >> deploy/README.md
          echo "- Works on desktop and mobile devices" >> deploy/README.md
          echo "" >> deploy/README.md
          echo "## Features" >> deploy/README.md
          echo "- Full Minecraft Classic gameplay" >> deploy/README.md
          echo "- Multiplayer support" >> deploy/README.md
          echo "- Touch controls for mobile" >> deploy/README.md
          echo "- Works on older devices" >> deploy/README.md
          
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web client - ${{ github.sha }}'
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classicube-web-client
          path: deploy/
          retention-days: 30