name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # We use the older container because emsdk 'install' no longer supports fastcomp natively
    container:
      image: trzeci/emscripten-fastcomp:1.39.0
    
    steps:
      - name: Checkout code
        # Using v3 instead of v4 to ensure compatibility with the older glibc in the container
        uses: actions/checkout@v3

      - name: Compile webclient
        run: |
          # Use emcc from the container
          emcc src/*.c src/webclient/*.c -o classisphere.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=134217728 \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=1 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g2 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap"]'
          
          # Fix texture pack URL
          sed -i 's|/static/default.zip|texpacks/default.zip|g' classisphere.js
          
          # Legacy-safe passive event fix
          sed -i 's/, useCapture)/, {passive:false, capture:useCapture})/' classisphere.js
          
          cp classisphere.js ClassiCube.js

      - name: Download assets
        run: |
          apt-get update && apt-get install -y wget
          wget -q https://www.classicube.net/static/default.zip
          wget -q https://www.classicube.net/static/audio.zip

      - name: Create deployment structure
        run: |
          mkdir -p deploy/texpacks
          mkdir -p deploy/audio
          cp classisphere.js deploy/
          cp ClassiCube.js deploy/
          cp default.zip deploy/texpacks/
          cp audio.zip deploy/audio/

      - name: Create play.html
        run: |
          cat <<'EOF' > deploy/play.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="apple-mobile-web-app-capable" content="yes">
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
              <meta name="mobile-web-app-capable" content="yes">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
              <title>ClassiCube - Full Screen</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
                  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; }
                  canvas { 
                      display: block; width: 100vw; height: 100vh; border: none; outline: none; 
                      cursor: grab; touch-action: none; image-rendering: pixelated;
                  }
                  #logmsg { 
                      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                      color: #fff; background: rgba(0,0,0,0.8); font-family: sans-serif; 
                      font-size: 13px; padding: 10px 20px; text-align: center; border-radius: 25px; 
                      pointer-events: none; z-index: 1000; border: 1px solid rgba(255,255,255,0.2); 
                  }
              </style>
          </head>
          <body>
              <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
              <div id="logmsg">Preparing game...</div>
              <script>
                  var Module = {
                      preRun: [], postRun: [], arguments: [ "Guest" ],
                      canvas: document.getElementById('canvas'),
                      setStatus: function(text) {
                          var el = document.getElementById('logmsg');
                          if (el) { 
                              el.innerHTML = text || 'ClassiCube Ready';
                              if (!text) el.style.display = 'none';
                          }
                      },
                      monitorRunDependencies: function(left) {
                          Module.setStatus(left ? 'Downloading Assets (' + left + ')...' : '');
                      }
                  };
                  window.onclick = function() { window.focus(); };
                  document.addEventListener('touchmove', function(e) {
                      if (e.touches.length > 1) e.preventDefault();
                  }, { passive: false });
              </script>
              <script async src="classisphere.js"></script>
          </body>
          </html>
          EOF

      - name: Create index.html
        run: echo '<meta http-equiv="refresh" content="0; url=play.html">' > deploy/index.html

      - name: Deploy to web branch
        # We use v3 here as well for container compatibility
        uses: peaceiris/actions-gh-pages@v3
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_branch: web
            publish_dir: ./deploy
            force_orphan: true