name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: trzeci/emscripten-fastcomp:1.39.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient
        run: |
          emcc src/*.c src/webclient/*.c -o ClassiCube.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=64MB \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=1 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=0 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g2 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s EXPORTED_FUNCTIONS='["_main", "_android_main"]' \
            -s EXTRA_EXPORTED_RUNTIME_METHODS='["ccall", "cwrap"]'
          
          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' ClassiCube.js
          
      - name: Create HTML wrapper with Module support
        run: |
          cat <<'EOF' > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no">
              <title>ClassiCube - Minecraft Classic</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                      user-select: none;
                      -webkit-tap-highlight-color: transparent;
                  }
                  body {
                      background: #000;
                      overflow: hidden;
                      touch-action: none;
                      position: fixed;
                      width: 100%;
                      height: 100%;
                  }
                  canvas {
                      display: block;
                      width: 100%;
                      height: 100%;
                      cursor: grab;
                      touch-action: none;
                      outline: none;
                  }
                  canvas:active {
                      cursor: grabbing;
                  }
                  #loading {
                      position: fixed;
                      top: 50%;
                      left: 50%;
                      transform: translate(-50%, -50%);
                      color: #fff;
                      font-family: 'Courier New', monospace;
                      background: rgba(0,0,0,0.9);
                      padding: 20px 30px;
                      border-radius: 10px;
                      z-index: 1000;
                      text-align: center;
                      border: 1px solid #444;
                      box-shadow: 0 0 20px rgba(0,0,0,0.5);
                  }
                  #loading-status {
                      margin-top: 10px;
                      font-size: 12px;
                      color: #aaa;
                  }
                  #error {
                      position: fixed;
                      bottom: 20px;
                      left: 20px;
                      right: 20px;
                      color: #f00;
                      background: rgba(0,0,0,0.8);
                      padding: 10px;
                      font-family: monospace;
                      font-size: 12px;
                      display: none;
                      z-index: 2000;
                      border-radius: 5px;
                  }
                  @media (max-width: 768px) {
                      #loading { font-size: 14px; padding: 15px 20px; }
                      #loading-status { font-size: 10px; }
                  }
              </style>
          </head>
          <body>
              <div id="loading">
                  <div>🎮 ClassiCube</div>
                  <div id="loading-status">Loading game...</div>
              </div>
              <div id="error"></div>
              
              <script>
                  // Error handler
                  window.onerror = function(msg, url, line, col, error) {
                      var errorDiv = document.getElementById('error');
                      errorDiv.innerHTML = 'Error: ' + msg + '<br>Line: ' + line;
                      errorDiv.style.display = 'block';
                      console.error('Game error:', msg, url, line, error);
                      return false;
                  };
                  
                  // Module object with required functions
                  var Module = {
                      canvas: null,
                      setStatus: function(text) {
                          var statusDiv = document.getElementById('loading-status');
                          if (statusDiv) {
                              statusDiv.innerHTML = text || 'Ready...';
                          }
                          console.log('Status:', text);
                          
                          // Hide loading when game is ready
                          if (text && text.indexOf('Running') !== -1) {
                              setTimeout(function() {
                                  var loading = document.getElementById('loading');
                                  if (loading) {
                                      loading.style.opacity = '0';
                                      setTimeout(function() {
                                          if (loading) loading.style.display = 'none';
                                      }, 500);
                                  }
                              }, 500);
                          }
                      },
                      print: function(text) {
                          console.log('[ClassiCube]', text);
                      },
                      printErr: function(text) {
                          console.error('[ClassiCube]', text);
                      },
                      preRun: [],
                      postRun: [],
                      onAbort: function(what) {
                          console.error('Abort:', what);
                          var errorDiv = document.getElementById('error');
                          errorDiv.innerHTML = 'Game crashed: ' + what;
                          errorDiv.style.display = 'block';
                      }
                  };
                  
                  // Create canvas when page loads
                  window.addEventListener('load', function() {
                      console.log('Page loaded, creating canvas...');
                      
                      // Create canvas element
                      var canvas = document.createElement('canvas');
                      canvas.id = 'canvas';
                      canvas.width = window.innerWidth;
                      canvas.height = window.innerHeight;
                      document.body.appendChild(canvas);
                      Module.canvas = canvas;
                      
                      // Handle resize
                      window.addEventListener('resize', function() {
                          if (Module.canvas) {
                              Module.canvas.width = window.innerWidth;
                              Module.canvas.height = window.innerHeight;
                          }
                      });
                      
                      Module.setStatus('Starting game...');
                  });
              </script>
              <script src="ClassiCube.js"></script>
          </body>
          </html>
          EOF
          
      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp ClassiCube.js deploy/
          cp index.html deploy/
          
          # Create a simple test page
          cat <<'EOF' > deploy/test.html
          <!DOCTYPE html>
          <html>
          <head><title>ClassiCube Test</title></head>
          <body style="background:#000;color:#fff;font-family:monospace;padding:20px">
              <h1>ClassiCube Web Client</h1>
              <p>If you see this, the server is working.</p>
              <p>Game should be at <a href="index.html" style="color:#0f0">index.html</a></p>
              <hr>
              <p>Status: <span id="status" style="color:#0f0">Ready</span></p>
              <button onclick="location.href='index.html'" style="padding:10px;margin-top:20px">Launch Game</button>
          </body>
          </html>
          EOF
          
          cat <<'EOF' > deploy/README.md
          # ClassiCube Web Client
          
          ## Play Minecraft Classic in your browser!
          
          ### How to Play:
          1. Open [index.html](index.html)
          2. Wait for the game to load
          3. Use WASD or arrow keys to move
          4. Mouse to look around
          5. Touch controls on mobile devices
          
          ### Features:
          - Full Minecraft Classic gameplay
          - Multiplayer support
          - Works on desktop and mobile
          - Touch screen controls
          
          ### If the game doesn't load:
          - Refresh the page
          - Check browser console (F12) for errors
          - Try a different browser (Chrome, Firefox, Edge)
          - Make sure JavaScript is enabled
          EOF
          
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web client with fixed Module.setStatus - ${{ github.sha }}'
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classicube-web-client
          path: deploy/
          retention-days: 30