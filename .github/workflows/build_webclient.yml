name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:3.1.50

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient
        run: |
          emcc src/*.c src/webclient/*.c -o classisphere.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=262144 \
            -s INITIAL_MEMORY=67108864 \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=0 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main","_interop_LoadIndexedDB"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]'

          sed -i 's|/static/default.zip|texpacks/default.zip|g' classisphere.js

          COUNT=$(grep -c "texpacks/default.zip" classisphere.js || echo "0")
          echo "Texture URL replacements: $COUNT"
          if [ "$COUNT" = "0" ]; then echo "WARNING: sed replace may have failed!"; fi

          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' classisphere.js

          cp classisphere.js ClassiCube.js
          echo "Build done!"; ls -lh classisphere.js

      - name: Download assets
        run: |
          wget -q https://www.classicube.net/static/default.zip || { echo "ERROR: default.zip failed"; exit 1; }
          wget -q https://www.classicube.net/static/audio.zip || echo "Audio skipped"
          ls -lh *.zip 2>/dev/null

      - name: Create deployment structure
        run: |
          mkdir -p deploy/texpacks deploy/audio
          cp classisphere.js deploy/
          cp ClassiCube.js deploy/
          cp default.zip deploy/texpacks/
          [ -f audio.zip ] && cp audio.zip deploy/audio/ || echo "No audio.zip"
          ls -la deploy/

      - name: Create play.html
        run: |
          echo "" | base64 -d > deploy/play.html
          echo "play.html: $(wc -c < deploy/play.html) bytes"

      - name: Create index.html
        run: |
          echo "" | base64 -d > deploy/index.html
          echo "index.html: $(wc -c < deploy/index.html) bytes"

      - name: Create README
        run: |
          python3 - <<'PYEOF'
          md = "# ClassiSphere Web Client\n\nClassiCube-based web client. Works on Android 6+, iOS 12+, desktop.\n\n## Play\n- [Play Now](play.html)\n\n## Multiplayer\nEdit arguments in play.html:\n```\narguments: ['YourName', '', 'server.address.com', '25565']\n```\n\n## Local Testing\n```\npython -m http.server 8000\n```\nOpen http://localhost:8000/play.html\n"
          with open("deploy/README.md", "w") as f:
              f.write(md)
          print("README.md created")
          PYEOF

      - name: Verify deployment files
        run: |
          echo "===== Deploy Files ====="
          ls -la deploy/
          du -sh deploy/*
          ls -la deploy/texpacks/
          ls -lh deploy/classisphere.js

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ClassiSphere - ${{ github.sha }}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classisphere-web-client
          path: deploy/
          retention-days: 30
