name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:3.1.50

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient
        run: |
          # Compile web client - asm.js mode for max old device support
          emcc src/*.c src/webclient/*.c -o classisphere.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=262144 \
            -s INITIAL_MEMORY=67108864 \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=0 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]'

          # Fix texture pack URL
          sed -i 's|/static/default.zip|texpacks/default.zip|g' classisphere.js

          # Verify sed worked
          COUNT=$(grep -c "texpacks/default.zip" classisphere.js || echo "0")
          echo "Texture URL replacements found: $COUNT"
          if [ "$COUNT" = "0" ]; then
            echo "WARNING: Texture URL sed replacement may have failed!"
          fi

          # Fix passive event listeners (fixes scroll warning on Android Chrome)
          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' classisphere.js

          # Backup copy
          cp classisphere.js ClassiCube.js

          echo "Build completed!"
          ls -lh classisphere.js

      - name: Download assets
        run: |
          echo "Downloading texture pack..."
          wget -q https://www.classicube.net/static/default.zip || {
            echo "ERROR: Failed to download default.zip — build cannot continue"
            exit 1
          }

          echo "Downloading audio pack (optional)..."
          wget -q https://www.classicube.net/static/audio.zip || echo "Audio pack download failed — skipping (non-critical)"

          echo "Assets downloaded:"
          ls -lh *.zip 2>/dev/null || echo "No zip files found"

      - name: Create deployment structure
        run: |
          mkdir -p deploy/texpacks
          mkdir -p deploy/audio

          cp classisphere.js deploy/
          cp ClassiCube.js deploy/

          cp default.zip deploy/texpacks/
          [ -f audio.zip ] && cp audio.zip deploy/audio/ || echo "Skipping audio.zip (not downloaded)"

          echo "Deployment structure:"
          ls -la deploy/

      - name: Create play.html
        run: |
          cat <<'HTMLEOF' > deploy/play.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
              <meta name="apple-mobile-web-app-capable" content="yes">
              <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
              <meta name="mobile-web-app-capable" content="yes">
              <title>ClassiSphere - Play</title>
              <style>
                  * {
                      margin: 0;
                      padding: 0;
                      box-sizing: border-box;
                  }

                  html, body {
                      width: 100%;
                      height: 100%;
                      background: #000;
                      overflow: hidden;
                      touch-action: none;
                      -webkit-user-select: none;
                      user-select: none;
                  }

                  /* Canvas fullscreen — vw/vh for reliable mobile sizing */
                  canvas {
                      display: block;
                      width: 100vw;
                      height: 100vh;
                      border: 0;
                      padding: 0;
                      background: #000;
                      cursor: grab;
                      /* iOS safe area padding handled via env() */
                      padding-top: env(safe-area-inset-top);
                      padding-bottom: env(safe-area-inset-bottom);
                      padding-left: env(safe-area-inset-left);
                      padding-right: env(safe-area-inset-right);
                  }

                  canvas:active {
                      cursor: grabbing;
                  }

                  #logmsg {
                      position: fixed;
                      bottom: max(10px, env(safe-area-inset-bottom));
                      left: 10px;
                      right: 10px;
                      color: #0f0;
                      background: rgba(0, 0, 0, 0.85);
                      font-family: 'Courier New', Courier, monospace;
                      font-size: 12px;
                      padding: 8px 12px;
                      border-radius: 5px;
                      z-index: 1000;
                      pointer-events: none;
                      text-align: center;
                      border: 1px solid #0f0;
                      transition: opacity 0.5s;
                  }

                  @media (max-width: 480px) {
                      #logmsg {
                          font-size: 10px;
                          padding: 5px 8px;
                      }
                  }
              </style>
          </head>
          <body>

              <canvas id="canvas"
                      oncontextmenu="event.preventDefault()"
                      tabindex="-1">
              </canvas>

              <div id="logmsg">Loading ClassiSphere...</div>

              <script type="text/javascript">
                  // Module must be defined BEFORE the game script loads
                  var Module = {
                      preRun: [],
                      postRun: [],

                      // Singleplayer: ["PlayerName"]
                      // Multiplayer:  ["PlayerName", "", "server.com", "25565"]
                      arguments: ["Guest"],

                      print: function(text) {
                          if (arguments.length > 1) {
                              text = Array.prototype.slice.call(arguments).join(' ');
                          }
                          console.log('[ClassiSphere]', text);
                      },

                      printErr: function(text) {
                          if (arguments.length > 1) {
                              text = Array.prototype.slice.call(arguments).join(' ');
                          }
                          console.error('[ClassiSphere Error]', text);
                      },

                      canvas: (function() {
                          return document.getElementById('canvas');
                      })(),

                      setStatus: function(text) {
                          console.log('[Status]', text);
                          var el = document.getElementById('logmsg');
                          if (!el) return;

                          el.innerHTML = text || 'Ready';

                          if (text && text.indexOf('Error') !== -1) {
                              el.style.color = '#f44';
                              el.style.borderColor = '#f44';
                          } else if (!text || text === 'Ready to play!') {
                              // Fade out log when game is ready
                              el.style.opacity = '0';
                          } else {
                              el.style.color = '#0f0';
                              el.style.borderColor = '#0f0';
                              el.style.opacity = '1';
                          }
                      },

                      totalDependencies: 0,

                      monitorRunDependencies: function(left) {
                          this.totalDependencies = Math.max(this.totalDependencies, left);
                          if (left) {
                              Module.setStatus(
                                  'Loading... (' +
                                  (this.totalDependencies - left) + '/' +
                                  this.totalDependencies + ')'
                              );
                          } else {
                              Module.setStatus('All downloads complete. Starting game...');
                          }
                      }
                  };

                  Module.setStatus('Initializing...');

                  // Global error handler
                  window.onerror = function(msg, url, line, col, error) {
                      Module.setStatus('Error: ' + msg);
                      return false;
                  };

                  // Tab visibility
                  document.addEventListener('visibilitychange', function() {
                      if (document.hidden) {
                          console.log('Tab hidden');
                      } else {
                          console.log('Tab visible');
                      }
                  });

                  // iOS Safari: prevent bounce scroll
                  document.addEventListener('touchmove', function(e) {
                      e.preventDefault();
                  }, { passive: false });

                  window.addEventListener('load', function() {
                      Module.setStatus('Ready to play!');
                  });
              </script>

              <!-- NO async here — Module object must be ready before script runs -->
              <script type="text/javascript" src="classisphere.js"></script>

          </body>
          </html>
          HTMLEOF

      - name: Create index.html
        run: |
          cat <<'EOF' > deploy/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta http-equiv="refresh" content="0; url=play.html">
              <meta charset="UTF-8">
              <title>ClassiSphere</title>
          </head>
          <body>
              <p>Redirecting to <a href="play.html">play.html</a>...</p>
          </body>
          </html>
          EOF

      - name: Create README
        run: |
          cat <<'EOF' > deploy/README.md
          # ClassiSphere Web Client

          ClassiCube-based web client hosted on GitHub Pages.

          ## Play
          - [Play Now](play.html)

          ## Features
          - Works on desktop and mobile (Android 6+, iOS 12+)
          - Touch controls on mobile
          - asm.js mode for maximum old device compatibility
          - Multiplayer support

          ## Multiplayer Setup
          Edit `arguments` in play.html:
          ```javascript
          arguments: ["YourName", "", "server.address.com", "25565"]
          ```

          ## Local Testing
          ```
          python -m http.server 8000
          # Open http://localhost:8000/play.html
          ```
          EOF

      - name: Verify deployment files
        run: |
          echo "========================================="
          echo "Deployment Files"
          echo "========================================="
          ls -la deploy/
          echo ""
          echo "File Sizes:"
          du -sh deploy/*
          echo ""
          echo "Texture Pack:"
          ls -la deploy/texpacks/
          echo ""
          echo "Game JS:"
          ls -lh deploy/classisphere.js

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ClassiSphere web client - ${{ github.sha }}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classisphere-web-client
          path: deploy/
          retention-days: 30
