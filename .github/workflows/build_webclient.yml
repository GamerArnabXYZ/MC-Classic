name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Added permissions to allow the GITHUB_TOKEN to write to the 'web' branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      # Note: This is an older image. If you encounter issues, 
      # consider 'emscripten/emsdk:latest'
      image: trzeci/emscripten-fastcomp:1.39.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient
        run: |
          # Ensure we are in the workspace and compile
          emcc src/*.c src/webclient/*.c -o ClassiCube.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=64MB \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=0 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g0 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration
          
          # Patching the generated JS to fix passive event listener issues
          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' ClassiCube.js
          
      - name: Create HTML wrapper
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
              <title>ClassiCube - Minecraft Classic</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { background: #000; overflow: hidden; touch-action: none; }
                  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
                  #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: monospace; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; z-index: 100; }
              </style>
          </head>
          <body>
              <div id="loading">Loading ClassiCube...<br>Please wait</div>
              <script>
                  window.addEventListener("load", function() {
                      setTimeout(function() {
                          var loading = document.getElementById("loading");
                          if (loading) loading.style.display = "none";
                      }, 1000);
                  });
              </script>
              <script src="ClassiCube.js"></script>
          </body>
          </html>
          EOF
          
      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp ClassiCube.js deploy/
          cp index.html deploy/
          
          cat <<EOF > deploy/README.md
          # ClassiCube Web Client
          Play Minecraft Classic directly in your browser!
          ## How to Play
          - Open index.html in any modern browser
          - Works on desktop and mobile devices
          EOF
          
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web client - ${{ github.sha }}'
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classicube-web-client
          path: deploy/
          retention-days: 30
