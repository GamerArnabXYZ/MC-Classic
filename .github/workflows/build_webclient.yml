name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: trzeci/emscripten-fastcomp:1.39.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient
        run: |
          # Compile web client WITHOUT android_main export
          emcc src/*.c src/webclient/*.c -o classisphere.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=64MB \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=1 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g2 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap"]'
          
          # Fix texture pack URL (point to our hosted default.zip)
          sed -i 's|/static/default.zip|texpacks/default.zip|g' classisphere.js
          
          # Fix passive event listeners
          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' classisphere.js
          
          # Also create a backup with original name
          cp classisphere.js ClassiCube.js
          
          echo "Build completed successfully!"
          ls -lh classisphere.js
          
      - name: Download assets
        run: |
          # Download default texture pack
          echo "Downloading texture pack..."
          wget -q https://www.classicube.net/static/default.zip
          
          # Download audio pack (optional but recommended)
          echo "Downloading audio pack..."
          wget -q https://www.classicube.net/static/audio.zip
          
          echo "Assets downloaded:"
          ls -lh *.zip
          
      - name: Create deployment structure
        run: |
          # Create deployment directory
          mkdir -p deploy/texpacks
          mkdir -p deploy/audio
          
          # Copy game files
          cp classisphere.js deploy/
          cp ClassiCube.js deploy/  # Keep both for compatibility
          
          # Copy assets
          cp default.zip deploy/texpacks/
          cp audio.zip deploy/audio/
          
          echo "Deployment structure created:"
          ls -la deploy/
          
      - name: Create play.html (Full Screen Fixed)
        run: |
          cat <<'EOF' > deploy/play.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>ClassiCube - Minecraft Classic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        /* Canvas full screen - no borders, no margins */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            padding: 0;
            background-color: black;
            cursor: grab;
            touch-action: none;
        }
        canvas:active {
            cursor: grabbing;
        }
        #logmsg {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            color: #0f0;
            background: rgba(0,0,0,0.85);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            border: 1px solid rgba(0,255,0,0.3);
            backdrop-filter: blur(4px);
        }
        @media (max-width: 768px) {
            #logmsg {
                bottom: 10px;
                left: 10px;
                right: 10px;
                font-size: 10px;
                padding: 8px 12px;
            }
        }
        /* Landscape mode fix */
        @media (orientation: landscape) {
            canvas {
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas" 
            style="display:block; border:0; padding:0; background-color: black;" 
            oncontextmenu="event.preventDefault()" 
            tabindex="-1">
    </canvas>
    <div id="logmsg">🎮 Loading ClassiCube...</div>
    
    <script type='text/javascript'>
        // Force canvas to fill screen on resize
        function resizeCanvas() {
            var canvas = document.getElementById('canvas');
            if (canvas) {
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
        }
        
        // Module object as per official documentation
        var Module = {
            preRun: [],
            postRun: [],
            arguments: [ "Guest" ],
            print: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.log('[ClassiCube]', text);
            },
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error('[ClassiCube]', text);
            },
            canvas: (function() { return document.getElementById('canvas'); })(),
            setStatus: function(text) {
                console.log('[Status]', text);
                var logMsg = document.getElementById('logmsg');
                if (logMsg) {
                    logMsg.innerHTML = text || '✨ Ready';
                    if (text && text.indexOf('Error') !== -1) {
                        logMsg.style.color = '#f00';
                        logMsg.style.borderColor = '#f00';
                    } else if (text && text.indexOf('Complete') !== -1) {
                        logMsg.style.color = '#0f0';
                        logMsg.style.borderColor = '#0f0';
                    }
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? '📦 Loading... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : '🚀 Starting game...');
            }
        };
        
        // Initial status
        Module.setStatus('Initializing...');
        
        // Resize handler
        window.addEventListener('resize', function() {
            setTimeout(resizeCanvas, 100);
        });
        window.addEventListener('orientationchange', function() {
            setTimeout(resizeCanvas, 200);
        });
        resizeCanvas();
        
        // Error handler
        window.onerror = function(msg, url, line, col, error) {
            Module.setStatus('⚠️ Error: ' + msg);
            Module.printErr('Error: ' + msg + ' at ' + url + ':' + line);
            return false;
        };
        
        // Handle visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                console.log('Tab hidden');
                Module.setStatus('⏸ Paused');
            } else {
                console.log('Tab visible');
                Module.setStatus('▶ Resumed');
            }
        });
        
        // Touch device detection
        if ('ontouchstart' in window) {
            console.log('Touch device detected');
            Module.setStatus('👆 Touch controls enabled');
        }
        
        // Page ready
        window.addEventListener('load', function() {
            console.log('Page loaded, canvas size:', Module.canvas.clientWidth, 'x', Module.canvas.clientHeight);
            Module.setStatus('🎮 Ready to play!');
        });
    </script>
    <script async type="text/javascript" src="classisphere.js"></script>
</body>
</html>
EOF
          
      - name: Create index.html (redirect to play.html)
        run: |
          cat <<'EOF' > deploy/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta http-equiv="refresh" content="0; url=play.html">
              <title>ClassiCube</title>
          </head>
          <body>
              <p>Redirecting to <a href="play.html">play.html</a>...</p>
          </body>
          </html>
          EOF
          
      - name: Create README
        run: |
          cat <<'EOF' > deploy/README.md
          # ClassiCube Web Client
          
          Official ClassiCube web client hosted on GitHub Pages.
          
          ## Play
          - [Play Singleplayer](play.html)
          
          ## Features
          - Full Minecraft Classic gameplay
          - Works on desktop and mobile
          - Touch controls on mobile devices
          - Multiplayer support (edit play.html to add server)
          
          ## For Multiplayer
          Edit the `arguments` array in play.html:
          ```javascript
          arguments: [ "YourName", "", "server.address.com", "25565" ]
          ```
          
          ## Local Development
          1. Download the files
          2. Run a local server: `python -m http.server 8000`
          3. Open http://localhost:8000/play.html
          
          ## Credits
          - [ClassiCube Project](https://www.classicube.net/)
          - Original Minecraft Classic by Mojang
          EOF
          
      - name: Verify deployment files
        run: |
          echo "========================================="
          echo "Deployment Files"
          echo "========================================="
          ls -la deploy/
          echo ""
          echo "File Sizes:"
          du -sh deploy/*
          echo ""
          echo "Texture Pack:"
          ls -la deploy/texpacks/
          echo ""
          echo "Game JS size:"
          ls -lh deploy/classisphere.js
          
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Full screen fix - CSS only change - ${{ github.sha }}'
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classicube-web-client
          path: deploy/
          retention-days: 30