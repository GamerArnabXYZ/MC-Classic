name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:3.1.50

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient
        run: |
          emcc src/*.c src/webclient/*.c -o classisphere.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=262144 \
            -s INITIAL_MEMORY=67108864 \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=0 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main","_interop_LoadIndexedDB"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]'

          sed -i 's|/static/default.zip|texpacks/default.zip|g' classisphere.js

          COUNT=$(grep -c "texpacks/default.zip" classisphere.js || echo "0")
          echo "Texture URL replacements: $COUNT"
          if [ "$COUNT" = "0" ]; then echo "WARNING: sed replace may have failed!"; fi

          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' classisphere.js

          cp classisphere.js ClassiCube.js
          echo "Build done!"; ls -lh classisphere.js

      - name: Download assets
        run: |
          wget -q https://www.classicube.net/static/default.zip || { echo "ERROR: default.zip failed"; exit 1; }
          wget -q https://www.classicube.net/static/audio.zip || echo "Audio skipped"
          ls -lh *.zip 2>/dev/null

      - name: Create deployment structure
        run: |
          mkdir -p deploy/texpacks deploy/audio
          cp classisphere.js deploy/
          cp ClassiCube.js deploy/
          cp default.zip deploy/texpacks/
          [ -f audio.zip ] && cp audio.zip deploy/audio/ || echo "No audio.zip"
          ls -la deploy/

      - name: Create play.html
        run: |
          python3 - <<'PYEOF'
          html = """<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>ClassiSphere</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      background: #0a0a0a;
    }

    body {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      min-height: -webkit-fill-available;
      background: #0a0a0a;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      /* Prevent pull-to-refresh on Android Chrome */
      overscroll-behavior: none;
    }

    #game-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* iOS safe area support */
      width: 100vw;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Canvas: border/padding MUST be 0 — or mouse coords break (ClassiCube rule) */
    #canvas {
      display: block;
      border: 0 !important;
      padding: 0 !important;
      margin: 0;
      background-color: #715580;
      /* Fill entire viewport — no letterboxing */
      width: 100vw;
      height: 100vh;
      height: calc(var(--vh, 1vh) * 100);
      /* Smooth canvas scaling */
      image-rendering: auto;
      -ms-interpolation-mode: bicubic;
    }

    /* Loading overlay — shown while game downloads */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logo-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 6vw, 52px);
      font-weight: bold;
      color: #c8a0e0;
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(200, 160, 224, 0.5), 0 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 8px;
    }

    .logo-sub {
      font-family: Arial, sans-serif;
      font-size: clamp(11px, 2.5vw, 14px);
      color: rgba(255,255,255,0.35);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    /* Progress bar */
    .progress-wrap {
      width: clamp(180px, 50vw, 300px);
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8b5cf6, #c084fc);
      border-radius: 2px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
    }

    #logmsg {
      font-family: Arial, sans-serif;
      font-size: clamp(12px, 3vw, 15px);
      color: rgba(255,255,255,0.5);
      text-align: center;
      white-space: pre-wrap;
      max-width: 80vw;
      line-height: 1.5;
    }

    /* Spinner dots */
    .dots {
      display: flex;
      gap: 8px;
      margin-top: 28px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.7);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Error state */
    #logmsg.error {
      color: #ff6b6b;
    }
  </style>
</head>
<body>

  <div id="game-wrapper">
    <canvas class="emscripten" id="canvas"
            oncontextmenu="event.preventDefault()"
            tabindex="-1"
            width="1000" height="562">
    </canvas>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="logo-text">ClassiSphere</div>
    <div class="logo-sub">Minecraft Classic</div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="logmsg">Initializing...</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script type="text/javascript">

    // ── Fix iOS 100vh bug (address bar causes wrong vh) ──────────
    function setVh() {
      var vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    setVh();
    window.addEventListener('resize', setVh);
    window.addEventListener('orientationchange', function() {
      setTimeout(setVh, 150);
    });

    // ── Logging ──────────────────────────────────────────────────
    var _lastProgress = 0;

    function logText(text) {
      console.log(text);
      var el = document.getElementById('logmsg');
      var bar = document.getElementById('progress-bar');
      var overlay = document.getElementById('loading-overlay');
      if (!el) return;

      if (!text || text === 'All downloads complete.') {
        // Game ready — animate progress to 100% then fade overlay
        if (bar) bar.style.width = '100%';
        setTimeout(function() {
          if (overlay) overlay.classList.add('hidden');
        }, 700);
        return;
      }

      el.innerHTML = text;

      // Parse progress percentage from "Preparing... (X/Y)"
      var match = text.match(/(\\d+)\\/(\\d+)/);
      if (match && bar) {
        var pct = Math.round((parseInt(match[1]) / parseInt(match[2])) * 90);
        bar.style.width = pct + '%';
      } else if (text.indexOf('Downloading') !== -1 && bar) {
        bar.style.width = '10%';
      }

      // Error styling
      if (text.indexOf('crashed') !== -1 || text.indexOf('Error') !== -1) {
        el.className = 'error';
        if (overlay) overlay.style.opacity = '1';
        if (overlay) overlay.style.visibility = 'visible';
      }
    }

    // ── IndexedDB check ──────────────────────────────────────────
    var idb = window.indexedDB || window.mozIndexedDB || window.webkitIndexedDB || window.msIndexedDB;
    if (!idb) {
      alert('IndexedDB unsupported\\nMaps and settings will not save');
      window.mozIndexedDB = {};
    }

    function preloadIndexedDB() { _interop_LoadIndexedDB(); }

    // ── Canvas resize ────────────────────────────────────────────
    function getCssInt(styles, prop) {
      return parseInt(styles.getPropertyValue(prop), 10) || 0;
    }

    function resizeGameCanvas() {
      var cc_canv = document.getElementById('canvas');
      if (!cc_canv) return;
      var dpi = window.devicePixelRatio || 1;

      var parent = cc_canv.parentNode;
      var styles = window.getComputedStyle(parent, null);
      var viewport_w = parent.offsetWidth
        - getCssInt(styles, 'padding-left')
        - getCssInt(styles, 'padding-right');

      var canv_w = Math.round(viewport_w);
      var canv_h = Math.round(window.innerHeight);

      if (canv_h % 2) canv_h -= 1;
      if (canv_w % 2) canv_w -= 1;

      cc_canv.width  = canv_w * dpi;
      cc_canv.height = canv_h * dpi;
    }

    window.addEventListener('resize', resizeGameCanvas);
    window.addEventListener('orientationchange', function() {
      setTimeout(resizeGameCanvas, 200);
    });

    // ── Crash handler ────────────────────────────────────────────
    function logFatal(event) {
      logText('ClassiSphere crashed:\\n' + event + '\\nOpen DevTools > Console for details');
      Module.setStatus = function(t) {
        if (event) Module.printErr('[post-exception] ' + event);
      };
    }

    // ── Prevent iOS bounce / Android pull-to-refresh ─────────────
    document.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    // ── Module object (must exist before classisphere.js loads) ──
    var Module = {
      preRun:  [ preloadIndexedDB, resizeGameCanvas ],
      postRun: [],
      arguments: ['Singleplayer'],
      print: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
      canvas: (function() { return document.getElementById('canvas'); })(),
      setStatus: logText,
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      onAbort: function(why) { logFatal('abort: ' + why); }
    };

    Module.setStatus('Downloading...');

    window.onerror = function(msg, source, lineno, colno, error) {
      source = (source + '').replace('classisphere.js', 'CC.js');
      logFatal(msg + ' at ' + lineno + ',' + colno + ' in ' + source);
    };

  </script>

  <!-- NO async — Module must be defined before this executes -->
  <script type="text/javascript" src="classisphere.js"></script>

</body>
</html>"""

          with open("deploy/play.html", "w") as f:
              f.write(html)
          print("play.html created successfully")
          PYEOF

      - name: Create index.html
        run: |
          python3 - <<'PYEOF'
          html = """<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>ClassiSphere</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .container {
      text-align: center;
      padding: 24px;
    }

    .title {
      font-family: Georgia, serif;
      font-size: clamp(32px, 8vw, 64px);
      font-weight: bold;
      color: #c8a0e0;
      letter-spacing: 2px;
      text-shadow: 0 0 40px rgba(200, 160, 224, 0.4);
      margin-bottom: 8px;
    }

    .sub {
      font-size: clamp(10px, 2.5vw, 13px);
      color: rgba(255,255,255,0.3);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .play-btn {
      display: inline-block;
      padding: 16px 48px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.6);
    }

    .play-btn:active {
      transform: translateY(0px);
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.4);
    }

    .note {
      margin-top: 24px;
      font-size: clamp(10px, 2.5vw, 12px);
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">ClassiSphere</div>
    <div class="sub">Minecraft Classic</div>
    <a href="play.html" class="play-btn">Play Now</a>
    <div class="note">Works on desktop &amp; mobile</div>
  </div>
  <script>
    // Auto-redirect after 1.5s
    setTimeout(function() {
      window.location.href = 'play.html';
    }, 1500);
  </script>
</body>
</html>"""
          with open("deploy/index.html", "w") as f:
              f.write(html)
          print("index.html created")
          PYEOF

      - name: Create README
        run: |
          python3 - <<'PYEOF'
          md = """# ClassiSphere Web Client

          ClassiCube-based web client. Works on Android 6+, iOS 12+, desktop.

          ## Play
          - [Play Now](play.html)

          ## Multiplayer
          Edit arguments in play.html:
          ```
          arguments: ['YourName', '', 'server.address.com', '25565']
          ```

          ## Local Testing
          ```
          python -m http.server 8000
          ```
          Open http://localhost:8000/play.html
          """
          with open("deploy/README.md", "w") as f:
              f.write(md)
          print("README.md created")
          PYEOF

      - name: Verify deployment files
        run: |
          echo "===== Deploy Files ====="
          ls -la deploy/
          du -sh deploy/*
          ls -la deploy/texpacks/
          ls -lh deploy/classisphere.js

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ClassiSphere - ${{ github.sha }}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classisphere-web-client
          path: deploy/
          retention-days: 30
