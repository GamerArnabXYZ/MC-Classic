name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Emscripten (Legacy Fastcomp)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 1.39.0-fastcomp

      - name: Compile webclient
        run: |
          emcc src/*.c src/webclient/*.c -o classisphere.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=134217728 \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=1 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=1 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g2 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main"]' \
            -s EXPORTED_RUNTIME_METHODS='["ccall", "cwrap"]'
          
          # Fix texture pack URL
          sed -i 's|/static/default.zip|texpacks/default.zip|g' classisphere.js
          
          # Fix passive event listeners
          sed -i 's/useCapture)/useCapture, { passive: false })/g' classisphere.js
          
          cp classisphere.js ClassiCube.js
          
      - name: Download assets
        run: |
          wget -q https://www.classicube.net/static/default.zip
          wget -q https://www.classicube.net/static/audio.zip
          
      - name: Create deployment structure
        run: |
          mkdir -p deploy/texpacks
          mkdir -p deploy/audio
          cp classisphere.js deploy/
          cp ClassiCube.js deploy/
          cp default.zip deploy/texpacks/
          cp audio.zip deploy/audio/
          
      - name: Create play.html (Full Screen Mobile Optimized)
        run: |
          cat <<'EOF' > deploy/play.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>ClassiCube - Full Screen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border: none; outline: none; cursor: grab; touch-action: none; }
        canvas:active { cursor: grabbing; }
        #logmsg { position: fixed; bottom: 15px; left: 15px; right: 15px; color: #0f0; background: rgba(0,0,0,0.75); font-family: monospace; font-size: 12px; padding: 8px 12px; text-align: center; border-radius: 8px; pointer-events: none; z-index: 1000; backdrop-filter: blur(5px); border: 1px solid rgba(0,255,0,0.3); }
        @media (max-width: 768px) { #logmsg { bottom: 10px; font-size: 10px; padding: 6px 10px; } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="logmsg">🎮 Loading ClassiCube...</div>
    
    <script>
        function forceFullScreen() {
            const canvas = document.getElementById('canvas');
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';
            };
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        }
        
        var Module = {
            preRun: [], postRun: [], arguments: [ "Guest" ],
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                var el = document.getElementById('logmsg');
                if (el) { el.innerHTML = text || '🎮 Ready'; }
                console.log('[Status]', text);
            },
            monitorRunDependencies: function(left) {
                Module.setStatus(left ? '📦 Loading... (' + left + ' files)' : '✨ Starting game...');
            }
        };
        
        forceFullScreen();
        
        if ('ontouchstart' in window) {
            Module.setStatus('👆 Touch controls active');
            document.body.style.touchAction = 'none';
        }
        
        document.addEventListener('touchend', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        window.addEventListener('load', function() {
            Module.setStatus('🎮 Game loading...');
        });
    </script>
    <script async src="classisphere.js"></script>
</body>
</html>
EOF

      - name: Create index.html
        run: echo '<meta http-equiv="refresh" content="0; url=play.html">' > deploy/index.html

      - name: Create README
        run: |
          cat <<'EOF' > deploy/README.md
# ClassiCube Web Client - Full Screen Minecraft Classic

Play Minecraft Classic in your browser! Fully optimized for mobile and desktop.

## 🎮 Play Now
[Open Game](play.html)

## Features
- ✅ Full screen on all devices
- ✅ Mobile touch controls
- ✅ Desktop keyboard/mouse
- ✅ Pixel-perfect rendering
- ✅ Multiplayer ready

## Controls
- **WASD / Arrow Keys**: Move
- **Mouse**: Look around  
- **Left Click**: Break blocks
- **Right Click**: Place blocks
- **Touch**: Tap and drag on mobile
EOF

      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Full screen mobile optimized - ${{ github.sha }}'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classicube-web-client
          path: deploy/
          retention-days: 30