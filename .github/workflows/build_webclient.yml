name: Build & Deploy Webclient

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: trzeci/emscripten-fastcomp:1.39.0
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile webclient with debug
        run: |
          # Compile with debug output
          emcc src/*.c src/webclient/*.c -o ClassiCube.js \
            -s WASM=0 \
            -s NO_EXIT_RUNTIME=1 \
            -s LEGACY_VM_SUPPORT=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ABORTING_MALLOC=0 \
            -s ENVIRONMENT=web \
            -s TOTAL_STACK=256Kb \
            -s TOTAL_MEMORY=64MB \
            -s SAFE_HEAP=0 \
            -s ASSERTIONS=1 \
            -s ALIASING_FUNCTION_POINTERS=1 \
            -s DISABLE_EXCEPTION_CATCHING=0 \
            --js-library src/webclient/interop_web.js \
            -Os \
            -g2 \
            -s SINGLE_FILE \
            -Wno-implicit-function-declaration \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_FUNCTIONS='["_main", "_android_main"]' \
            -s EXTRA_EXPORTED_RUNTIME_METHODS='["ccall", "cwrap", "addFunction"]'
          
          # Fix passive event listeners
          sed -i 's#eventHandler.useCapture);#{ useCapture: eventHandler.useCapture, passive: false });#g' ClassiCube.js
          
          # Also fix any other potential issues
          sed -i 's/Module\["canvas"\]/Module.canvas/g' ClassiCube.js 2>/dev/null || true
          
      - name: Create HTML wrapper with error handling
        run: |
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
              <title>ClassiCube - Minecraft Classic</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { background: #000; overflow: hidden; touch-action: none; }
                  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
                  #loading { 
                      position: fixed; 
                      top: 50%; 
                      left: 50%; 
                      transform: translate(-50%, -50%); 
                      color: white; 
                      font-family: monospace; 
                      background: rgba(0,0,0,0.9); 
                      padding: 20px; 
                      border-radius: 10px; 
                      z-index: 100;
                      text-align: center;
                  }
                  #error {
                      position: fixed;
                      bottom: 20px;
                      left: 20px;
                      right: 20px;
                      color: red;
                      background: rgba(0,0,0,0.8);
                      padding: 10px;
                      font-family: monospace;
                      font-size: 12px;
                      display: none;
                      z-index: 200;
                  }
              </style>
          </head>
          <body>
              <div id="loading">
                  Loading ClassiCube...<br>
                  <span style="font-size: 12px;">Please wait (may take 30-60 seconds)</span>
              </div>
              <div id="error"></div>
              <script>
                  // Error handling
                  window.onerror = function(msg, url, line, col, error) {
                      var errorDiv = document.getElementById('error');
                      errorDiv.innerHTML = 'Error: ' + msg + '<br>Line: ' + line;
                      errorDiv.style.display = 'block';
                      console.error('Game error:', msg, url, line);
                      return false;
                  };
                  
                  // Wait for load
                  window.addEventListener("load", function() {
                      console.log("Page loaded, starting ClassiCube...");
                      
                      // Hide loading after a delay or when game starts
                      setTimeout(function() {
                          var loading = document.getElementById("loading");
                          if (loading) loading.style.display = "none";
                      }, 5000);
                  });
                  
                  // Log when script starts
                  console.log("ClassiCube script loading...");
              </script>
              <script src="ClassiCube.js"></script>
          </body>
          </html>
          EOF
          
      - name: Create test page
        run: |
          cat <<EOF > deploy-test.html
          <!DOCTYPE html>
          <html>
          <head><title>Test Page</title></head>
          <body>
              <h1>ClassiCube Test Page</h1>
              <p>If you see this, the server is working.</p>
              <p>Game should be at <a href="index.html">index.html</a></p>
          </body>
          </html>
          EOF
          
      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp ClassiCube.js deploy/
          cp index.html deploy/
          cp deploy-test.html deploy/
          
          # Check file sizes
          echo "Build files:" >> build-info.txt
          ls -lh ClassiCube.js >> build-info.txt
          echo "File size: $(du -h ClassiCube.js | cut -f1)" >> build-info.txt
          cp build-info.txt deploy/
          
          cat <<EOF > deploy/README.md
          # ClassiCube Web Client
          
          Play Minecraft Classic directly in your browser!
          
          ## How to Play
          1. Open index.html
          2. Wait for game to load (may take 30-60 seconds)
          3. Use WASD or arrow keys to move
          4. Mouse to look around
          5. Touch controls on mobile
          
          ## If Black Screen:
          - Check browser console (F12) for errors
          - Try refreshing the page
          - Make sure JavaScript is enabled
          - Try a different browser
          EOF
          
      - name: Deploy to web branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./deploy
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy web client - ${{ github.sha }}'
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: classicube-web-client
          path: deploy/
          retention-days: 30